{% extends "member/member_base.html" %}
{% block title %}Request an Event — Tri-M Hours{% endblock %}
{% block content %}
<h2 class="mb-2">Request an Event</h2>
<p class="text-muted mb-4">Submit an idea. An officer will review and approve it before it's listed.</p>

<div class="card" style="max-width: 640px;">
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Event Title <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" required placeholder="e.g. Park Cleanup Day">
      </div>
      <div class="form-row">
        <div class="form-group col-md-5">
          <label>Date <span class="text-danger">*</span></label>
          <input type="date" name="date" class="form-control" required>
        </div>
        <div class="form-group col-md-3">
          <label>Hours Value</label>
          <input type="number" name="hours_value" class="form-control"
                 step="0.5" min="0.5" value="1.0" required>
        </div>
        <div class="form-group col-md-4">
          <label>Location</label>
          <input type="text" name="location" class="form-control" placeholder="Optional">
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" class="form-control" rows="3"
                  placeholder="What will participants be doing?"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-paper-plane mr-1"></i>Submit Request
      </button>
      <a href="{{ url_for('member.dashboard') }}" class="btn btn-link">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
